<!-- LOGIN -->
{% extends "base.html" %}
{% block title %}Log in — DarkFleet{% endblock %}
{% block content %}
<div style="max-width:400px; margin:4rem auto;">
    <div class="page-header">
        <h1>Log in</h1>
        <p>Access to DarkFleet Intelligence</p>
    </div>
    <div class="card">
        <form method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%">Log in</button>
        </form>
        <div style="margin-top:1.5rem; text-align:center; font-family:var(--mono); font-size:0.75rem; color:var(--muted);">
            No account? <a href="/register" style="color:var(--accent);">Register</a>
        </div>
    </div>
</div>
{% endblock %}
