<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DarkFleet{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #060a0f;
            --surface:  #0d1520;
            --border:   #1a2a3a;
            --accent:   #00d4ff;
            --danger:   #ff3b3b;
            --warn:     #ffaa00;
            --clean:    #00ff88;
            --text:     #c8d8e8;
            --muted:    #4a6a8a;
            --mono:     'Share Tech Mono', monospace;
            --sans:     'Barlow Condensed', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 16px;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0,80,120,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,40,80,0.1) 0%, transparent 50%);
        }

        /* ── NAV ── */
        nav {
            background: rgba(6,10,15,0.95);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .nav-logo {
            font-family: var(--mono);
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 2px;
            margin-right: 3rem;
        }
        .nav-logo span { color: var(--muted); }
        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-right: 2rem;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--accent); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
        .nav-user {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
        }
        .btn-nav {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 1rem;
            font-family: var(--sans);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-nav:hover { border-color: var(--accent); color: var(--accent); }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-left: 2rem;
            flex: 1;
            max-width: 400px;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            flex: 1;
            outline: none;
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar button {
            background: var(--accent);
            border: none;
            color: var(--bg);
            font-family: var(--sans);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* ── MAIN ── */
        main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        /* ── FLASH ── */
        .flash {
            background: rgba(255,59,59,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem 1.5rem;
            margin-bottom: 1.5rem;
            font-family: var(--mono);
            font-size: 0.85rem;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card-header {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        /* ── RISK BADGE ── */
        .risk {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 0.2rem 0.6rem;
            display: inline-block;
        }
        .risk-HIGH { background: rgba(255,59,59,0.15); color: var(--danger); border: 1px solid var(--danger); }
        .risk-SUSPICIOUS { background: rgba(255,170,0,0.15); color: var(--warn); border: 1px solid var(--warn); }
        .risk-CLEAN { background: rgba(0,255,136,0.1); color: var(--clean); border: 1px solid var(--clean); }

        /* ── TABLE ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(26,42,58,0.5);
            font-size: 0.9rem;
        }
        tr:hover td { background: rgba(0,212,255,0.03); }
        td a { color: var(--accent); text-decoration: none; }
        td a:hover { text-decoration: underline; }

        /* ── FLAG ── */
        .flag {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            padding: 0.1rem 0.4rem;
            border: 1px solid var(--border);
        }

        /* ── MMSI ── */
        .mmsi {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--accent);
            opacity: 0.7;
        }

        /* ── SCORE ── */
        .score {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-block;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 1.5rem;
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            background: transparent;
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn-primary:hover { background: transparent; color: var(--accent); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* ── FORM ── */
        .form-group { margin-bottom: 1.25rem; }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        input[type=text], input[type=password] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        /* ── LIVE DOT ── */
        .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--clean);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── PAGE HEADER ── */
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }
        .page-header p {
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">DARK<span>FLEET</span></a>
    <a href="/">Home</a>

    <form class="search-bar" action="/search" method="get">
        <input type="text" name="q" placeholder="Search name, MMSI, IMO...">
        <button type="submit">SEARCH</button>
    </form>

    <div class="nav-right">
        {% if session.username %}
            <span class="nav-user">{{ session.username }}</span>
            <a href="/profile" class="btn-nav">Profile</a>
            <a href="/logout" class="btn-nav">Log out</a>
        {% else %}
            <a href="/login" class="btn-nav">Log in</a>
            <a href="/register" class="btn-nav">Register</a>
        {% endif %}
    </div>
</nav>

<main>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
